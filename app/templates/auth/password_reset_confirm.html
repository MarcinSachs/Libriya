{% extends "base/main_base.html" %}
{% import 'base/macros.html' as macros %}
{% block content %}

<div class="w-full min-h-[80vh] flex items-center justify-center">
  <div class="max-w-md w-full mx-auto px-4 flex flex-col justify-center items-center">
    {{ macros.display_flashes() }}
    <h2 class="text-4xl lg:text-5xl font-bold mb-2 text-primary">{{ _('New Password') }}</h2>
    <p class="text-gray-600 mb-8 text-lg text-center">
      {{ _('Enter your new password below.') }}
    </p>

    <div class="glass-card rounded-2xl p-8 shadow-lg mb-6 w-full mt-8">
      <form method="POST" action="{{ url_for('auth.password_reset_confirm') }}" class="space-y-6">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <input type="hidden" name="token" value="{{ token }}" />
        <div>
          <label for="password" class="block text-sm font-semibold mb-2 text-text-dark">
            {{ _('New Password') }}
          </label>
          <input
            type="password"
            id="password"
            name="password"
            required
            placeholder="{{ _('Enter new password') }}"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg bg-white focus:outline-none focus:border-accent focus:ring-2 focus:ring-accent focus:ring-opacity-20 transition"
          />
        </div>
        <button type="submit" class="w-full py-3 px-4 bg-[#1a535c] hover:bg-[#0f3a45] text-white font-semibold rounded-lg hover:shadow-lg transform hover:-translate-y-1 transition">
          {{ _('Change Password') }}
        </button>
      </form>
    </div>

    <p class="text-center text-gray-600 text-sm">
      <a href="{{ url_for('auth.login') }}" class="text-primary hover:text-accent font-semibold transition">
        &larr; {{ _('Back to Login') }}
      </a>
    </p>
  </div>
</div>
{% endblock %}
